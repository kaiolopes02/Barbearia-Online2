<!-- pages/confirmation.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmação - The Barber</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/confirmation.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="confirmation-page">
        <div class="confirmation-card">
            <div class="confirmation-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
            </div>
            
            <h1 class="confirmation-title">Agendamento Confirmado!</h1>
            <p class="confirmation-subtitle">Seu horário foi reservado com sucesso</p>

            <div class="confirmation-details" id="confirmationDetails">
                <div class="detail-row">
                    <span class="detail-label">Nome</span>
                    <span class="detail-value" id="detailNome">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Serviço</span>
                    <span class="detail-value" id="detailServico">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Data</span>
                    <span class="detail-value" id="detailData">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Horário</span>
                    <span class="detail-value" id="detailHorario">-</span>
                </div>
                <div class="detail-row detail-row--highlight">
                    <span class="detail-label">ID do Agendamento</span>
                    <span class="detail-value" id="detailId">-</span>
                </div>
            </div>

            <div class="confirmation-actions">
                <button class="btn btn--danger" id="cancelBtn">
                    <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    <span>Cancelar Agendamento</span>
                </button>
                
                <a href="../index.html" class="btn btn--secondary">
                    <span>Voltar para Home</span>
                </a>
            </div>

            <p class="confirmation-note">
                Um e-mail de confirmação foi enviado para o endereço informado.
                <br>Guarde seu ID de agendamento para futuras referências.
            </p>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="loading-spinner__ring"></div>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/confirmation.js"></script>
</body>
</html>
